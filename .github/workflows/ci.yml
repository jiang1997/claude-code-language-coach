name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Syntax check original version
        run: node --check plugins/language-coach/scripts/language-helper.js

      - name: Syntax check statusline version
        run: |
          node --check plugins/language-coach-statusline/scripts/language-helper.js
          node --check plugins/language-coach-statusline/scripts/language-statusline.js

      - name: Run tests
        run: |
          cd plugins/language-coach && node --test
          cd ../language-coach-statusline && node --test
